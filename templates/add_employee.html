{% extends 'base.html' %}
{% block nav_add %}active{% endblock %}
{% block page_title %}Add Employee{% endblock %}

{% block content %}
<div class="card" style="max-width:680px;">
    <div class="card-header-row">
        <div class="card-title"><i class="bi bi-person-plus" style="color:var(--accent2)"></i> &nbsp;New Employee Record</div>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" name="employee_id" placeholder="e.g. EMP001" required>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="e.g. Ali Hassan" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" placeholder="e.g. Sales">
            </div>
            <div class="form-group">
                <label>Position</label>
                <input type="text" name="position" placeholder="e.g. Manager">
            </div>
            <div class="form-group">
                <label>Attendance (%)</label>
                <input type="number" step="0.1" name="attendance" placeholder="e.g. 92.5">
            </div>
            <div class="form-group">
                <label>Performance Rating (0–10)</label>
                <input type="number" step="0.1" name="performance_rating" placeholder="e.g. 8.5">
            </div>
            <div class="form-group">
                <label>Experience (years)</label>
                <input type="number" name="experience" placeholder="e.g. 4">
            </div>
            <div class="form-group">
                <label>Salary (PKR)</label>
                <input type="number" name="salary" placeholder="e.g. 75000">
            </div>
        </div>
        <div class="form-group">
            <label>Project Completion Rate (%)</label>
            <input type="number" step="0.1" name="project_completion_rate" placeholder="e.g. 95.0">
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save Employee</button>
            <a href="/employees/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
