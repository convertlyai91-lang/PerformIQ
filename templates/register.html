<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — PerformIQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0f1117; color:#e8eaf0; font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .box { background:#1a1d27; border:1px solid #2a2f45; border-radius:16px; padding:40px; width:100%; max-width:400px; }
        .logo { font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; text-align:center; margin-bottom:8px; }
        .sub { text-align:center; color:#7b82a0; font-size:13px; margin-bottom:32px; }
        label { display:block; font-size:12px; color:#7b82a0; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
        input { width:100%; background:#21253a; border:1px solid #2a2f45; border-radius:8px; padding:11px 14px; color:#e8eaf0; font-size:13px; margin-bottom:16px; outline:none; }
        input:focus { border-color:#6c63ff; }
        button { width:100%; background:#6c63ff; color:white; border:none; border-radius:8px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
        button:hover { background:#5a52e0; }
        .link { text-align:center; margin-top:20px; font-size:13px; color:#7b82a0; }
        .link a { color:#6c63ff; text-decoration:none; }
        .error { background:rgba(255,107,107,0.1); border:1px solid #ff6b6b; border-radius:8px; padding:10px 14px; font-size:13px; color:#ff6b6b; margin-bottom:16px; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">📊 PerformIQ</div>
    <div class="sub">Create your account</div>
    {% if form.errors %}
    <div class="error">
        {% for field in form %}{% for error in field.errors %}{{ error }}<br>{% endfor %}{% endfor %}
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username">
        <label>Password</label>
        <input type="password" name="password1">
        <label>Confirm Password</label>
        <input type="password" name="password2">
        <button type="submit">Create Account</button>
    </form>
    <div class="link">Already have an account? <a href="/login/">Sign in</a></div>
</div>
</body>
</html>
