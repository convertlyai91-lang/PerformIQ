{% extends 'base.html' %}
{% block content %}
<h2>🤖 ML Performance Predictor</h2>
<p class="text-muted">Enter employee details to predict their training score</p>

<form method="post" class="w-50">
    {% csrf_token %}
    <div class="mb-2">
        <label>Age</label>
        <input type="number" name="age" class="form-control" placeholder="e.g. 28" required>
    </div>
    <div class="mb-2">
        <label>Department (0=HR, 1=IT, 2=Sales, 3=Finance...)</label>
        <input type="number" name="department" class="form-control" placeholder="0-9" required>
    </div>
    <div class="mb-2">
        <label>Number of Trainings</label>
        <input type="number" name="no_of_trainings" class="form-control" placeholder="e.g. 2" required>
    </div>
    <div class="mb-2">
        <label>Previous Year Rating (1-5)</label>
        <input type="number" step="0.1" name="previous_year_rating" class="form-control" placeholder="e.g. 3.5" required>
    </div>
    <div class="mb-2">
        <label>Length of Service (years)</label>
        <input type="number" name="length_of_service" class="form-control" placeholder="e.g. 5" required>
    </div>
    <div class="mb-2">
        <label>KPIs Met More Than 80% (0=No, 1=Yes)</label>
        <input type="number" name="kpis_met" class="form-control" placeholder="0 or 1" required>
    </div>
    <div class="mb-2">
        <label>Awards Won (0=No, 1=Yes)</label>
        <input type="number" name="awards_won" class="form-control" placeholder="0 or 1" required>
    </div>
    <button type="submit" class="btn btn-success">Predict Score</button>
    <a href="/" class="btn btn-secondary">Back</a>
</form>

{% if result %}
<div class="alert alert-success mt-4 w-50">
    <h4>Predicted Training Score: <strong>{{ result }} / 100</strong></h4>
</div>
{% endif %}

{% endblock %}
