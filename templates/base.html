<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Employee Performance Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #21253a;
            --border: #2a2f45;
            --accent: #6c63ff;
            --accent2: #00d4aa;
            --accent3: #ff6b6b;
            --accent4: #ffd93d;
            --text: #e8eaf0;
            --text-muted: #7b82a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid var(--border); }
        .brand-logo { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .sidebar-nav { padding: 16px 12px; flex: 1; }
        .nav-section-label { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 10px 6px; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; margin-bottom: 2px; transition: all 0.15s; border-left: 3px solid transparent; }
        .nav-link:hover { background: var(--surface2); color: var(--text); }
        .nav-link.active { background: rgba(108, 99, 255, 0.15); color: var(--accent); border-left: 3px solid var(--accent); }
        .nav-link i { font-size: 16px; width: 18px; }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); }
        .main { margin-left: 240px; min-height: 100vh; }
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .topbar-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; }
        .topbar-actions { display: flex; align-items: center; gap: 12px; }
        .badge-live { background: rgba(0,212,170,0.15); color: var(--accent2); border: 1px solid rgba(0,212,170,0.3); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .badge-live::before { content: ''; width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .content { padding: 32px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .card-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .stat-card.purple::before { background: var(--accent); }
        .stat-card.green::before { background: var(--accent2); }
        .stat-card.yellow::before { background: var(--accent4); }
        .stat-card.red::before { background: var(--accent3); }
        .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 14px; }
        .stat-card.purple .stat-icon { background: rgba(108,99,255,0.15); color: var(--accent); }
        .stat-card.green .stat-icon { background: rgba(0,212,170,0.15); color: var(--accent2); }
        .stat-card.yellow .stat-icon { background: rgba(255,217,61,0.15); color: var(--accent4); }
        .stat-card.red .stat-icon { background: rgba(255,107,107,0.15); color: var(--accent3); }
        .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: all 0.15s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #5a52e0; color: white; }
        .btn-success { background: rgba(0,212,170,0.15); color: var(--accent2); border: 1px solid rgba(0,212,170,0.3); }
        .btn-success:hover { background: rgba(0,212,170,0.25); color: var(--accent2); }
        .btn-danger { background: rgba(255,107,107,0.15); color: var(--accent3); border: 1px solid rgba(255,107,107,0.3); }
        .btn-danger:hover { background: rgba(255,107,107,0.25); color: var(--accent3); }
        .btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
        .btn-secondary:hover { color: var(--text); }
        .btn-warning { background: rgba(255,217,61,0.15); color: var(--accent4); border: 1px solid rgba(255,217,61,0.3); }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 16px; border-bottom: 1px solid var(--border); text-align: left; }
        tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tbody tr:hover { background: var(--surface2); }
        tbody tr:last-child td { border-bottom: none; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"], input[type="password"], input[type="file"], select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; }
        input:focus, select:focus { border-color: var(--accent); }
        .rating { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .rating-high { background: rgba(0,212,170,0.15); color: var(--accent2); }
        .rating-mid { background: rgba(255,217,61,0.15); color: var(--accent4); }
        .rating-low { background: rgba(255,107,107,0.15); color: var(--accent3); }
        .insight-card { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; font-size: 13px; }
        .insight-icon { width: 36px; height: 36px; background: rgba(108,99,255,0.15); color: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .search-input-wrap { position: relative; flex: 1; }
        .search-input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input-wrap input { padding-left: 36px; }
        .predict-result { background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(0,212,170,0.1)); border: 1px solid rgba(108,99,255,0.3); border-radius: 12px; padding: 24px; text-align: center; margin-top: 24px; }
        .predict-score { font-family: 'Space Grotesk', sans-serif; font-size: 56px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; display: block; }
    
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed;
                left: -240px;
                transition: left 0.3s ease;
                z-index: 999;
            }
            .sidebar.open { left: 0; }
            .main { margin-left: 0; }
            .topbar { padding: 12px 16px; }
            .content { padding: 16px; }
            .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .form-grid { grid-template-columns: 1fr; }
            .topbar-title { font-size: 15px; }
            table { font-size: 12px; }
            thead th { padding: 8px; }
            tbody td { padding: 8px; }
            .btn { padding: 6px 10px; font-size: 12px; }
            .hamburger {
                display: flex !important;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 8px;
                cursor: pointer;
                font-size: 18px;
            }
            .overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 998;
            }
            .overlay.open { display: block; }
        }
        @media (min-width: 769px) {
            .hamburger { display: none; }
        }
        @media (max-width: 480px) {
            .stat-grid { grid-template-columns: 1fr; }
            .predict-score { font-size: 40px; }
        }
</style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <a href="/" class="brand-logo">
            <div class="logo-icon">📊</div>
            <div>
                <div>PerformIQ</div>
                <div class="brand-sub">Analytics Platform</div>
            </div>
        </a>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
            <i class="bi bi-grid-1x2"></i> Dashboard
        </a>
        <a href="/employees/" class="nav-link {% block nav_employees %}{% endblock %}">
            <i class="bi bi-people"></i> Employees
        </a>
        <a href="/add/" class="nav-link {% block nav_add %}{% endblock %}">
            <i class="bi bi-person-plus"></i> Add Employee
        </a>
        
        </a>
        <a href="/predict/" class="nav-link {% block nav_predict %}{% endblock %}">
            <i class="bi bi-cpu"></i> ML Predictor
        </a>
        <div class="nav-section-label" style="margin-top:16px;">Export</div>
        <a href="/export-csv/" class="nav-link">
            <i class="bi bi-filetype-csv"></i> Export CSV
        </a>
        <a href="/export-pdf/" class="nav-link">
            <i class="bi bi-file-pdf"></i> Export PDF
        </a>
    </nav>
    <div class="sidebar-footer">PerformIQ v1.0 · Final Year Project</div>
</aside>

<main class="main">
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
            <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
        </div>
        <div class="topbar-actions">
            <span class="badge-live">Live Data</span>
            <span style="color:var(--text-muted);font-size:13px;">👤 {{ request.user.username }}</span>
            <a href="/add/" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> Add Employee</a>
            <a href="/logout/" class="btn btn-sm" style="background:rgba(255,107,107,0.15);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3);">⬛ Logout</a>
        </div>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<script>
function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('overlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
}
</script>
</body>
</html>
